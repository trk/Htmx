name: "Tag, Release"
on:
  push:
    branches:
      - main
    paths:
      - "Htmx.module.php"
jobs:
  tag_and_release:
    runs-on: ubuntu-latest
    env:
      VERSION_FILE: "Htmx.module.php"
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure Git User
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"
      - name: Extract module version
        id: get_version
        run: |
          VERSION=$(php -r "\$c = file_get_contents('${{ env.VERSION_FILE }}'); preg_match('/[\'\"].*?version.*?[\'\"]\s*=>\s*[\'\"]?([0-9\.]+)[\'\"]?/', \$c, \$m); \$v = \$m[1] ?? ''; if(is_numeric(\$v) && strpos((string)\$v, '.') === false) { \$v = (int)\$v; \$major = intval(\$v / 100); \$minor = intval(\$v / 10) % 10; \$micro = \$v % 10; \$v = \"\$major.\$minor.\$micro\"; } echo \$v;")

          if [ -z "$VERSION" ]; then
            echo "::error::Could not find the version number in ${{ env.VERSION_FILE }}"
            exit 1
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
      - name: Build Changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          commitMode: true
          toTag: "v${{ steps.get_version.outputs.version }}"
          configurationJson: |
            {
              "template": "## What's Changed\n#{{UNCATEGORIZED}}\n\n**Full Changelog**: https://github.com/${{ github.repository }}/compare/#{{PREV_TAG}}...#{{NEXT_TAG}}",
              "commit_template": "* #{{TITLE}} by @#{{AUTHOR}} in #{{HASH}}",
              "empty_template": "* No changes detected"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Git Tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG: ${{ steps.build_changelog.outputs.changelog }}
        run: |
          TAG="v${{ steps.get_version.outputs.version }}"
          echo "Generated Tag: $TAG"
          git tag $TAG
          git push origin $TAG
          
          echo "$CHANGELOG" > release_notes.md
          gh release create $TAG -F release_notes.md
